<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorpresa!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Effetto specchio per la fotocamera frontale */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .overlay {
            position: absolute;
            z-index: 2;
            color: white;
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            padding: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .heart {
            color: red;
        }
        #permission-message {
            position: absolute;
            z-index: 3;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 1.5rem;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="permission-message">Per vedere la sorpresa, consenti l'uso della fotocamera quando richiesto.</div>
    <video id="videoElement" autoplay playsinline></video>
    <div class="overlay" id="textOverlay" style="display: none;">
        Ti amo amore <span class="heart">❤️</span>
    </div>

    <script>
        const video = document.querySelector("#videoElement");
        const permissionMessage = document.getElementById('permission-message');
        const textOverlay = document.getElementById('textOverlay');

        // Richiede l'accesso alla fotocamera frontale
        if (navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(function (stream) {
                    video.srcObject = stream;
                    permissionMessage.style.display = 'none'; // Nascondi il messaggio
                    textOverlay.style.display = 'block';      // Mostra la scritta
                })
                .catch(function (error) {
                    console.log("Qualcosa è andato storto!", error);
                    permissionMessage.innerText = "Ops! Devi consentire l'accesso alla fotocamera per vedere la sorpresa 😢";
                });
        } else {
            permissionMessage.innerText = "Il tuo browser non supporta questa funzione.";
        }
    </script>
</body>
</html>
